# ML4T Diagnostic Documentation
# MkDocs Material configuration with Picasso Blue palette

site_name: ML4T Diagnostic
site_description: Statistical validation and diagnostics for ML-based quantitative trading
site_url: https://ml4trading.io/docs/diagnostic/
repo_url: https://github.com/ml4t/diagnostic
repo_name: ml4t/diagnostic

# Theme configuration
theme:
  name: ml4t-docs-theme

  palette:
    scheme: default
    primary: custom
    accent: custom

  font: false

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

  icon:
    repo: fontawesome/brands/github

# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Plugins
plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            signature_crossrefs: true

# Navigation structure
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - User Guide:
    - Four-Tier Validation: user-guide/validation-tiers.md
    - Cross-Validation: user-guide/cross-validation.md
    - CV Configuration: user-guide/cv-configuration.md
    - Statistical Tests: user-guide/statistical-tests.md
    - Feature Diagnostics: user-guide/feature-diagnostics.md
    - Feature Selection: user-guide/feature-selection.md
    - Workflows: user-guide/workflows.md
    - Backtest Tearsheets: user-guide/backtest-tearsheets.md
    - Trade Analysis: user-guide/trade-analysis.md
    - Trade-SHAP Dashboard: DASHBOARD.md
  - API Reference:
    - api/index.md
  - Book Guide:
    - Overview: book-guide/index.md
    - Case Studies: book-guide/case-studies.md
  - Methods:
    - Overview: methods/index.md
    - Deflated Sharpe Ratio: methods/deflated-sharpe-ratio.md
    - Combinatorial Purged CV: methods/cpcv.md
    - HAC-adjusted IC: methods/hac-ic.md
  - Reference:
    - Architecture: reference/architecture.md
    - Academic References: reference/references.md

# Extra configuration
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/stefan-jansen
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/mlaboratory

  generator: false

